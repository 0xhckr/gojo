name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          # Pinned to v2.15.x for reproducibility. Now using
          # `homebrew_casks` (supported since v2.10) instead of the
          # deprecated `brews` section. Safe to upgrade to v2.16+.
          version: "~> v2.15"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No separate tap token needed: the Homebrew cask is committed
          # back into this same repo (Casks/gojo.rb), which GITHUB_TOKEN
          # can already write to thanks to the `contents: write` permission.

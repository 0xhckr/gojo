name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          # Pinned to v2.15.x: v2.16 hard-deprecated the `brews` section,
          # but gojo is a cross-platform CLI (not a macOS .app), so Casks
          # would break Linuxbrew installs. Formulas are still the correct
          # Homebrew construct for CLI tools. Unpin only if we migrate off
          # formulas or drop Linux support.
          version: "~> v2.15"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No separate tap token needed: the Homebrew formula is committed
          # back into this same repo (Formula/gojo.rb), which GITHUB_TOKEN
          # can already write to thanks to the `contents: write` permission.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      - name: Verify goreleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          # Pinned to match release.yml — see note there about `brews`.
          version: "~> v2.15"
          args: check

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

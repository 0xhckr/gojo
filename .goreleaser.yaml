# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: gojo

before:
  hooks:
    - go mod tidy
    # Single source of truth: the VERSION file must match the git tag
    # (minus the leading `v`). Fails the release if they drift.
    - cmd: |
        v="$(cat VERSION)"
        tag="${GORELEASER_CURRENT_TAG#v}"
        [ "$v" = "$tag" ] || { echo "VERSION file ($v) != tag ($tag)"; exit 1; }

builds:
  - id: gojo
    main: ./
    binary: gojo
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # Stamp the version into main.version for `gojo --version`.
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    # name example: gojo_1.0.0_darwin_arm64.tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else }}{{ .Os }}{{ end }}_{{ .Arch }}
    # Ship the binary + license + readme in each archive.
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: 0xhckr
    name: gojo
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"

# Auto-generate and push the Homebrew formula to the tap repo.
# Requires the HOMEBREW_TAP_GITHUB_TOKEN secret in the release workflow.
brews:
  - name: gojo
    repository:
      owner: 0xhckr
      name: homebrew-gojo
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/0xhckr/gojo
    description: "Fullscreen terminal UI for jj (Jujutsu VCS)"
    license: MIT
    skip_upload: auto
    dependencies:
      - name: jj
    install: |
      bin.install "gojo"
      bin.install_symlink "gojo" => "gj"
    test: |
      assert_match version.to_s, shell_output("#{bin}/gojo --version")
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"

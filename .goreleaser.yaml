# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: gojo

before:
  hooks:
    - go mod tidy
    # Single source of truth: the VERSION file must match the git tag
    # (minus the leading `v`). Fails the release if they drift.
    - sh -c 'v="$(cat VERSION)"; [ "$v" = "{{ .Version }}" ] || { echo "VERSION file ($v) != tag ({{ .Version }})"; exit 1; }'

builds:
  - id: gojo
    main: ./
    binary: gojo
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # Stamp the version into main.version for `gojo --version`.
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    # name example: gojo_1.0.0_darwin_arm64.tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else }}{{ .Os }}{{ end }}_{{ .Arch }}
    # Ship the binary + license + readme in each archive.
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: 0xhckr
    name: gojo
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"

# Auto-generate and push the Homebrew cask into this same repo at
# Casks/gojo.rb. Because the cask lives in the repo we're releasing
# from, the default GITHUB_TOKEN (granted `contents: write` by the
# release workflow) is sufficient — no separate tap repo or PAT needed.
# Users install via: brew tap 0xhckr/gojo https://github.com/0xhckr/gojo
#                  brew install --cask gojo
homebrew_casks:
  - name: gojo
    repository:
      owner: 0xhckr
      name: gojo
      branch: main
    homepage: https://github.com/0xhckr/gojo
    description: "Fullscreen terminal UI for jj (Jujutsu VCS)"
    skip_upload: auto
    binaries:
      - gojo
    url:
      verified: github.com/0xhckr/gojo/
    dependencies:
      - formula: jj
    # Binary is not signed/notarized — strip quarantine on install.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/gojo"]
          end
    caveats: "Run `ln -sf $(which gojo) $(brew --prefix)/bin/gj` for the shorter 'gj' alias."
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew cask update for {{ .ProjectName }} version {{ .Tag }}"
